<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Aurora Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#F8ECE9;}
  .fc-scroll::-webkit-scrollbar{display:none}
  .fc-scroll{scrollbar-width:none}
  input,textarea,button{font-family:inherit}
  @keyframes fcTwinkle{0%,100%{opacity:.25}50%{opacity:.9}}
  html{height:100%}
  body{min-height:100%;font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#4A3436;}
  .desktop-shell{min-height:100vh;width:100%;display:block;position:relative;overflow:hidden;background:#F8ECE9;}
  .desktop-intro{display:none;}
  .app-column{position:relative;z-index:1;display:block;min-height:100vh;}
  #app{position:relative;width:100%;min-height:100vh;background:#F8ECE9;box-shadow:none;overflow:hidden;}
  @media (min-width: 760px){
    #app{max-width:none;border-radius:0;min-height:100vh;}
    #app > div{min-height:100vh !important;}
  }
  @media (max-width: 759px){
    .desktop-shell{display:block;min-height:100vh;padding:0;background:#F8ECE9;overflow:visible;}
    .app-column{display:block;}
    #app{max-width:none;min-height:100vh;box-shadow:none;}
  }
</style>
</head>
<body>

<main class="desktop-shell">
  <section class="app-column" aria-label="Aurora Calendar app">
    <div id="app"></div>
  </section>
</main>

<template id="t">
<div style="position:relative;width:100%;min-height:100vh;color:#4A3436;font-family:'Plus Jakarta Sans',system-ui,sans-serif;overflow:hidden;background:linear-gradient(165deg,#FBEAE6 0%,#F7E3EC 45%,#EFE2F0 100%);">

<!-- sparkle layer -->
<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;" preserveAspectRatio="none">
  <defs>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#F6C9D6" stop-opacity="0.55"/><stop offset="100%" stop-color="#F6C9D6" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#E4D3F0" stop-opacity="0.5"/><stop offset="100%" stop-color="#E4D3F0" stop-opacity="0"/></radialGradient>
  </defs>
  <circle cx="15%" cy="12%" r="160" fill="url(#glowA)"/>
  <circle cx="88%" cy="20%" r="150" fill="url(#glowB)"/>
  <circle cx="80%" cy="85%" r="170" fill="url(#glowA)"/>
  <g></g>
</svg>
<div style="position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden;">
  <sc-for list="{{ sparkles }}" as="sp" hint-placeholder-count="0">
    <span style="{{ sp.style }}">{{ sp.chr }}</span>
  </sc-for>
</div>

<!-- ============ ONBOARDING ============ -->
<sc-if value="{{ isOnboarding }}" hint-placeholder-val="{{ true }}">
<div style="position:absolute;inset:0;display:flex;flex-direction:column;background:transparent;z-index:1;">
  <div style="height:0;"></div>
  <div style="flex:0 0 auto;padding:6px 22px 14px;display:flex;gap:6px;">
    <sc-for list="{{ obDots }}" as="d" hint-placeholder-count="6">
      <div style="height:4px;border-radius:2px;flex:1;background:{{ d.bg }};"></div>
    </sc-for>
  </div>
  <div class="fc-scroll" style="flex:1;overflow-y:auto;padding:8px 22px 16px;">

    <sc-if value="{{ isOb1 }}" hint-placeholder-val="{{ true }}">
      <div style="padding-top:20px;">
        <div style="width:100%;height:220px;border-radius:28px;background:linear-gradient(135deg,#F1B9C7,#D98CA0);position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:26px;box-shadow:0 14px 30px rgba(201,124,144,.28);">
          <span style="font-size:52px;">✦</span>
          <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;color:#fff;margin-top:10px;letter-spacing:-.2px;">Yo Momma K's Calendar</span>
          <span style="position:absolute;top:16px;right:20px;font-size:20px;color:#fff;opacity:.8;">✧</span>
          <span style="position:absolute;bottom:20px;left:24px;font-size:16px;color:#fff;opacity:.7;">✧</span>
        </div>
        <h1 style="font-size:30px;line-height:1.2;font-weight:800;margin:0 0 12px;color:#4A3436;letter-spacing:-.3px;">Thrilled to plan your family's days!</h1>
        <p style="font-size:15px;line-height:1.55;color:#9C7F76;margin:0 0 24px;">Bills, paychecks, calendars, and family life — organized together, beautifully.</p>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <sc-for list="{{ obWelcomeRows }}" as="r" hint-placeholder-count="4">
            <div style="display:flex;align-items:center;gap:13px;background:#FFFFFF;border-radius:16px;padding:12px 14px;box-shadow:0 4px 14px rgba(201,124,144,.10);">
              <div style="width:36px;height:36px;border-radius:11px;background:{{ r.bg }};display:flex;align-items:center;justify-content:center;font-size:16px;color:{{ r.fg }};flex:0 0 auto;">{{ r.icon }}</div>
              <span style="font-size:14.5px;color:#4A3436;font-weight:500;">{{ r.text }}</span>
            </div>
          </sc-for>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isOb2 }}" hint-placeholder-val="{{ true }}">
      <div>
        <h1 style="font-size:26px;font-weight:800;margin:10px 0 6px;color:#4A3436;">How do you want to start?</h1>
        <p style="font-size:14.5px;color:#9C7F76;margin:0 0 20px;">Pick what's easiest — change it anytime.</p>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <sc-for list="{{ obMethods }}" as="m" hint-placeholder-count="4">
            <button onClick="{{ m.onClick }}" style="{{ m.style }}">
              <div style="width:42px;height:42px;border-radius:13px;background:{{ m.iconBg }};display:flex;align-items:center;justify-content:center;font-size:18px;color:#C97C93;flex:0 0 auto;">{{ m.icon }}</div>
              <div style="text-align:left;flex:1;">
                <div style="font-size:15.5px;font-weight:700;color:#4A3436;">{{ m.title }}</div>
                <div style="font-size:12.5px;color:#9C7F76;margin-top:2px;">{{ m.sub }}</div>
              </div>
              <sc-if value="{{ m.selected }}" hint-placeholder-val="{{ true }}"><span style="color:#C97C93;font-size:18px;">✓</span></sc-if>
            </button>
          </sc-for>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isOb2b }}" hint-placeholder-val="{{ true }}">
      <div>
        <h1 style="font-size:26px;font-weight:800;margin:10px 0 6px;color:#4A3436;">Paste your notes list</h1>
        <p style="font-size:14.5px;color:#9C7F76;margin:0 0 14px;">From Apple Notes, a text file, or anywhere.</p>
        <textarea value="{{ pasteText }}" onChange="{{ onPasteChange }}" spellcheck="false" style="width:100%;height:220px;background:#FFFFFF;border:none;border-radius:18px;color:#4A3436;font-size:14.5px;line-height:1.7;padding:16px;resize:none;outline:none;box-shadow:0 4px 14px rgba(201,124,144,.10);"></textarea>
        <button onClick="{{ onParse }}" style="margin-top:14px;width:100%;height:52px;border:none;border-radius:16px;background:linear-gradient(135deg,#E7A9B8,#C97C93);color:#fff;font-size:15.5px;font-weight:700;cursor:pointer;box-shadow:0 10px 22px rgba(201,124,144,.35);">Preview what we found →</button>
      </div>
    </sc-if>

    <sc-if value="{{ isOb3 }}" hint-placeholder-val="{{ true }}">
      <div>
        <h1 style="font-size:26px;font-weight:800;margin:10px 0 6px;color:#4A3436;">When do you get paid?</h1>
        <p style="font-size:14.5px;color:#9C7F76;margin:0 0 20px;">We'll group bills into windows.</p>
        <div style="font-size:11.5px;font-weight:700;color:#9C7F76;text-transform:uppercase;letter-spacing:.6px;margin:0 4px 10px;">Frequency</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;">
          <sc-for list="{{ payFreqOptions }}" as="f" hint-placeholder-count="5">
            <button onClick="{{ f.onClick }}" style="{{ f.style }}">{{ f.label }}</button>
          </sc-for>
        </div>
        <div style="background:#FFFFFF;border-radius:18px;overflow:hidden;box-shadow:0 4px 14px rgba(201,124,144,.10);">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid #F5E7EA;">
            <span style="font-size:15px;">Next paycheck</span><input value="{{ payDate }}" onChange="{{ onPayDate }}" placeholder="YYYY-MM-DD" style="width:140px;text-align:right;background:#FCEEF1;border:none;border-radius:8px;padding:8px 10px;color:#C97C93;font-size:14px;font-weight:700;outline:none;"/>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid #F5E7EA;">
            <span style="font-size:15px;">Typical amount</span><input value="{{ payAmount }}" onChange="{{ onPayAmount }}" inputmode="decimal" placeholder="0" style="width:140px;text-align:right;background:#FCEEF1;border:none;border-radius:8px;padding:8px 10px;color:#C97C93;font-size:14px;font-weight:700;outline:none;"/>
          </div>
          <button onClick="{{ onToggleVary }}" style="width:100%;background:none;border:none;display:flex;align-items:center;justify-content:space-between;padding:15px 16px;cursor:pointer;color:#4A3436;">
            <span style="font-size:15px;">Amount changes each time</span>
            <div style="{{ varyTrackStyle }}"><div style="{{ varyKnobStyle }}"></div></div>
          </button>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isOb4 }}" hint-placeholder-val="{{ true }}">
      <div>
        <h1 style="font-size:26px;font-weight:800;margin:10px 0 4px;color:#4A3436;">Here's what we found</h1>
        <p style="font-size:14.5px;color:#9C7F76;margin:0 0 16px;">Uncheck anything you don't want.</p>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <sc-for list="{{ parsedBuckets }}" as="b" hint-placeholder-count="6">
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin:0 4px 8px;">
                <span style="width:8px;height:8px;border-radius:50%;background:{{ b.color }};"></span>
                <span style="font-size:12px;font-weight:700;color:#4A3436;text-transform:uppercase;letter-spacing:.4px;">{{ b.label }}</span>
                <span style="font-size:12.5px;color:#9C7F76;">{{ b.countStr }}</span>
              </div>
              <div style="background:#FFFFFF;border-radius:16px;overflow:hidden;box-shadow:0 4px 14px rgba(201,124,144,.10);">
                <sc-for list="{{ b.items }}" as="it" hint-placeholder-count="2">
                  <div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #F5E7EA;">
                    <button onClick="{{ it.onToggle }}" style="width:22px;height:22px;border-radius:50%;border:2px solid #F1DEE2;background:#fff;flex:0 0 auto;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;"><sc-if value="{{ it.sel }}" hint-placeholder-val="{{ true }}"><span style="color:#8CA679;font-size:14px;font-weight:700;">✓</span></sc-if></button>
                    <div style="flex:1;min-width:0;">
                      <div style="font-size:14.5px;color:#4A3436;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ it.title }}</div>
                      <sc-if value="{{ it.hasMeta }}" hint-placeholder-val="{{ true }}"><div style="font-size:12.5px;color:#9C7F76;margin-top:1px;">{{ it.meta }}</div></sc-if>
                    </div>
                  </div>
                </sc-for>
              </div>
            </div>
          </sc-for>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isOb5 }}" hint-placeholder-val="{{ true }}">
      <div>
        <h1 style="font-size:26px;font-weight:800;margin:10px 0 6px;color:#4A3436;">When should we remind you?</h1>
        <p style="font-size:14.5px;color:#9C7F76;margin:0 0 20px;">Gentle nudges, never nagging.</p>
        <div style="font-size:11.5px;font-weight:700;color:#9C7F76;text-transform:uppercase;letter-spacing:.6px;margin:0 4px 10px;">Lead time</div>
        <div style="background:#FFFFFF;border-radius:18px;overflow:hidden;margin-bottom:20px;box-shadow:0 4px 14px rgba(201,124,144,.10);">
          <sc-for list="{{ remindLeadOptions }}" as="r" hint-placeholder-count="4">
            <button onClick="{{ r.onClick }}" style="width:100%;background:none;border:none;border-bottom:1px solid #F5E7EA;display:flex;align-items:center;justify-content:space-between;padding:15px 16px;cursor:pointer;color:#4A3436;">
              <span style="font-size:15px;">{{ r.label }}</span>
              <div style="{{ r.track }}"><div style="{{ r.knob }}"></div></div>
            </button>
          </sc-for>
        </div>
        <div style="font-size:11.5px;font-weight:700;color:#9C7F76;text-transform:uppercase;letter-spacing:.6px;margin:0 4px 10px;">Remind me about</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;">
          <sc-for list="{{ remindTypeChips }}" as="c" hint-placeholder-count="5">
            <button onClick="{{ c.onClick }}" style="{{ c.style }}">{{ c.label }}</button>
          </sc-for>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isOb6 }}" hint-placeholder-val="{{ true }}">
      <div>
        <h1 style="font-size:26px;font-weight:800;margin:10px 0 6px;color:#4A3436;">What should open first?</h1>
        <p style="font-size:14.5px;color:#9C7F76;margin:0 0 20px;">Switch anytime from the nav bar.</p>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <sc-for list="{{ homeViewOptions }}" as="h" hint-placeholder-count="4">
            <button onClick="{{ h.onClick }}" style="{{ h.style }}">
              <div style="width:42px;height:42px;border-radius:13px;background:{{ h.iconBg }};display:flex;align-items:center;justify-content:center;font-size:18px;color:#C97C93;flex:0 0 auto;">{{ h.icon }}</div>
              <div style="text-align:left;flex:1;">
                <div style="font-size:15.5px;font-weight:700;color:#4A3436;">{{ h.title }}</div>
                <div style="font-size:12.5px;color:#9C7F76;margin-top:2px;">{{ h.sub }}</div>
              </div>
              <sc-if value="{{ h.selected }}" hint-placeholder-val="{{ true }}"><span style="color:#C97C93;font-size:18px;">✓</span></sc-if>
            </button>
          </sc-for>
        </div>
      </div>
    </sc-if>

  </div>
  <div style="flex:0 0 auto;padding:12px 22px calc(20px + env(safe-area-inset-bottom));display:flex;gap:12px;">
    <sc-if value="{{ obCanBack }}" hint-placeholder-val="{{ true }}">
      <button onClick="{{ obBack }}" style="height:52px;padding:0 22px;border:none;border-radius:16px;background:#FFFFFF;color:#4A3436;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(201,124,144,.10);">Back</button>
    </sc-if>
    <button onClick="{{ obNext }}" style="flex:1;height:52px;border:none;border-radius:16px;background:linear-gradient(135deg,#E7A9B8,#C97C93);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 10px 22px rgba(201,124,144,.35);">{{ obNextLabel }}</button>
  </div>
</div>
</sc-if>

<!-- ============ APP ============ -->
<sc-if value="{{ isApp }}" hint-placeholder-val="{{ true }}">
<div style="position:absolute;inset:0;display:flex;flex-direction:column;background:transparent;z-index:1;">
  <div style="height:0;"></div>
  <div style="flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:8px 20px 12px;">
    <button style="width:42px;height:42px;border:none;border-radius:13px;background:#FFFFFF;color:#C97C93;font-size:16px;cursor:pointer;box-shadow:0 4px 12px rgba(201,124,144,.14);display:flex;align-items:center;justify-content:center;">▦</button>
    <div style="text-align:center;">
      <div style="font-size:11px;color:#9C7F76;">{{ todayStr }}</div>
      <div style="font-size:18px;font-weight:800;color:#4A3436;">{{ tabTitle }}</div>
    </div>
    <div style="position:relative;">
      <button onClick="{{ openSettings }}" style="width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#E7A9B8,#C97C93);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(201,124,144,.25);">FC</button>
      <span style="position:absolute;top:-6px;left:-8px;font-size:13px;color:#F1B9C7;">✧</span>
    </div>
  </div>
  <div class="fc-scroll" style="flex:1;overflow-y:auto;padding:4px 18px 116px;">

    <!-- TODAY -->
    <sc-if value="{{ isToday }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;flex-direction:column;gap:18px;">
        <div style="background:linear-gradient(150deg,#F1B9C7,#D98CA0);border-radius:26px;padding:20px;position:relative;overflow:hidden;box-shadow:0 14px 30px rgba(201,124,144,.28);">
          <span style="position:absolute;top:14px;right:18px;font-size:16px;color:#fff;opacity:.7;">✧</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="width:6px;height:6px;border-radius:50%;background:#fff;"></span>
            <span style="font-size:12px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px;">Paycheck window · {{ pc.windowStr }}</span>
          </div>
          <div style="font-size:38px;font-weight:800;color:#fff;margin:10px 0 2px;letter-spacing:-1px;">{{ pc.leftStr }}</div>
          <div style="font-size:14px;color:rgba(255,255,255,.85);margin-bottom:14px;">left to spend this window</div>
          <div style="height:8px;border-radius:4px;background:rgba(255,255,255,.35);overflow:hidden;margin-bottom:16px;display:flex;">
            <div style="width:{{ pc.billsPct }};background:#fff;"></div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex;gap:18px;">
              <sc-for list="{{ pc.stats }}" as="s" hint-placeholder-count="3">
                <div><div style="font-size:11px;color:rgba(255,255,255,.75);">{{ s.label }}</div><div style="font-size:14px;font-weight:700;color:#fff;">{{ s.value }}</div></div>
              </sc-for>
            </div>
            <button onClick="{{ goMoney }}" style="width:40px;height:40px;border-radius:50%;border:none;background:#fff;color:#C97C93;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">→</button>
          </div>
        </div>

        <div>
          <div style="font-size:16px;font-weight:800;color:#4A3436;margin:0 4px 10px;">This week <span style="font-size:12px;color:#E3B87C;">✧</span></div>
          <div style="display:flex;gap:8px;overflow-x:auto;" class="fc-scroll">
            <sc-for list="{{ weekStrip }}" as="d" hint-placeholder-count="7">
              <button onClick="{{ d.onClick }}" style="{{ d.style }}">
                <span style="font-size:10.5px;opacity:.8;">{{ d.dow }}</span>
                <span style="font-size:16px;font-weight:800;margin-top:2px;">{{ d.day }}</span>
                <div style="display:flex;gap:2px;height:5px;margin-top:4px;">
                  <sc-for list="{{ d.dots }}" as="dt" hint-placeholder-count="2"><span style="width:4px;height:4px;border-radius:50%;background:{{ dt.c }};"></span></sc-for>
                </div>
              </button>
            </sc-for>
          </div>
        </div>

        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin:0 4px 10px;">
            <span style="font-size:16px;font-weight:800;color:#4A3436;">Due soon</span>
            <button onClick="{{ goMoney }}" style="background:none;border:none;color:#C97C93;font-size:13px;font-weight:700;cursor:pointer;">See all</button>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <sc-for list="{{ dueSoon }}" as="it" hint-placeholder-count="3">
              <div style="background:#FFFFFF;border-radius:18px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 14px rgba(201,124,144,.10);">
                <div style="width:40px;height:40px;border-radius:13px;background:{{ it.catBg }};display:flex;align-items:center;justify-content:center;font-size:17px;color:{{ it.catFg }};flex:0 0 auto;">{{ it.icon }}</div>
                <div onClick="{{ it.onOpen }}" style="flex:1;min-width:0;cursor:pointer;">
                  <div style="{{ it.titleStyle }}">{{ it.title }}</div>
                  <div style="font-size:12.5px;color:{{ it.metaColor }};margin-top:1px;">{{ it.metaStr }}</div>
                </div>
                <div style="text-align:right;">
                  <div style="{{ it.amountStyle }}">{{ it.amountStr }}</div>
                  <button onClick="{{ it.onToggle }}" style="{{ it.checkStyle }}"><sc-if value="{{ it.paid }}" hint-placeholder-val="{{ true }}"><span style="color:#fff;font-size:11px;font-weight:700;">✓</span></sc-if></button>
                </div>
              </div>
            </sc-for>
          </div>
        </div>

        <div>
          <div style="font-size:16px;font-weight:800;color:#4A3436;margin:0 4px 10px;">Family reminders</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <sc-for list="{{ famReminders }}" as="t" hint-placeholder-count="3">
              <div style="background:#FFFFFF;border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 14px rgba(201,124,144,.10);">
                <button onClick="{{ t.onToggle }}" style="{{ t.checkStyle }}"><sc-if value="{{ t.paid }}" hint-placeholder-val="{{ true }}"><span style="color:#fff;font-size:11px;font-weight:700;">✓</span></sc-if></button>
                <span style="{{ t.titleStyle }}">{{ t.title }}</span>
              </div>
            </sc-for>
          </div>
        </div>
      </div>
    </sc-if>

    <!-- MONEY -->
    <sc-if value="{{ isMoney }}" hint-placeholder-val="{{ true }}">
      <div>
        <div style="display:flex;gap:8px;overflow-x:auto;padding:2px 0 16px;" class="fc-scroll">
          <sc-for list="{{ moneySubs }}" as="s" hint-placeholder-count="5">
            <button onClick="{{ s.onClick }}" style="{{ s.style }}">{{ s.label }}</button>
          </sc-for>
        </div>

        <sc-if value="{{ isMoneyPay }}" hint-placeholder-val="{{ true }}">

// Resolve a dotted path ("a.b.c") against a context object (prototype-aware).
function resolve(path, ctx){
  var parts = path.trim().split('.');
  var v = ctx;
  for (var i = 0; i < parts.length; i++){
    if (v == null) return undefined;
    v = v[parts[i]];
  }
  return v;
}

// Strip the {{ }} delimiters from a single-expression attribute value.
function stripTpl(s){
  return (s || '').trim().replace(/^\{\{\s*/, '').replace(/\s*\}\}$/, '');
}

// Interpolate every {{ path }} occurrence inside a string.
function interp(str, ctx){
  return str.replace(/\{\{\s*([\w.]+)\s*\}\}/g, function(_m, p){
    var v = resolve(p, ctx);
    return v != null ? v : '';
  });
}

// Apply a style value that may be a CSS string or a JS style object.
function applyStyle(el, val){
  if (typeof val === 'string') el.setAttribute('style', val);
  else if (val && typeof val === 'object') Object.assign(el.style, val);
}

// True when the whole attribute value is a single {{ path }} expression.
var SINGLE = /^\{\{\s*[\w.]+\s*\}\}$/;

// Recursively process a template node against a context, returning live DOM.
function proc(node, ctx){

  if (node.nodeType === 3){

      if (rIf) fIf.appendChild(rIf);
    }

    }

/* ===========================================================================
   DCLogic base class — state + batched re-render lifecycle.
   =========================================================================== */
class DCLogic {
  constructor(){ this._pend = false; }

  setState(u){
    var next = (typeof u === 'function') ? u(this.state) : u;
    this.state = Object.assign({}, this.state, next);
    if (!this._pend){
      this._pend = true;
      requestAnimationFrame(function(self){ return function(){ self._pend = false; self._render(); }; }(this));
    }
  }

  _render(){
    var vals = this.renderVals();
    var clone = this._tmpl.content.cloneNode(true);
    var f = document.createDocumentFragment();
    for (var i = 0; i < clone.childNodes.length; i++){
      var r = proc(clone.childNodes[i], vals);
      if (r) f.appendChild(r);
    }
    this._root.textContent = '';
    this._root.appendChild(f);
  }
}

    const mtypes=[{key:'bill',label:'Bill'},{key:'paycheck',label:'Paycheck'},{key:'appointment',label:'Appointment'},{key:'task',label:'Task'},{key:'event',label:'Event'}];
    v.modalTypes=mtypes.map(t=>({...t,onClick:()=>this.setState({draft:{...S.draft,type:t.key}}),style:`padding:9px 16px;border-radius:16px;white-space:nowrap;border:none;background:${d.type===t.key?'linear-gradient(135deg,#E7A9B8,#C97C93)':'#FFFFFF'};color:${d.type===t.key?'#fff':'#4A3436'};font-size:13.5px;font-weight:700;cursor:pointer;`}));
    const PH={ bill:['Title','Amount','Due date (YYYY-MM-DD)','Notes'], event:['Title','Amount','Date (YYYY-MM-DD)','Notes'], task:['Task name','','','Notes'], appointment:['Title','','Date (YYYY-MM-DD)','Notes / location'], paycheck:['Label (optional)','Amount','Pay date (YYYY-MM-DD)','Notes'] };
    const ph=PH[d.type]||PH.bill;
    v.ph1=ph[0]; v.ph2=ph[1]; v.ph3=ph[2]; v.ph4=ph[3];
    v.draftTitle=d.title||''; v.draftAmount=d.amount!=null?String(d.amount):''; v.draftDate=d.dueDate||''; v.draftNote=d.note||'';
    v.onDraftTitle=e=>this.setState({draft:{...S.draft,title:e.target.value}});
    v.onDraftAmount=e=>this.setState({draft:{...S.draft,amount:e.target.value}});
    v.onDraftDate=e=>this.setState({draft:{...S.draft,dueDate:e.target.value}});
    v.onDraftNote=e=>this.setState({draft:{...S.draft,note:e.target.value}});
    v.draftRepeatLabel=d.repeat||'None';
    v.draftReminderLabel=d.reminder||'None';
    v.draftPaycheckLabel=(()=>{ if(!d.pc) return 'None'; const p=S.paychecks.find(x=>x.id===d.pc); return p?this.md(p.date):'None'; })();
    v.onCycleRepeat=()=>{const o=['None','Weekly','Biweekly','Monthly','Yearly'];const c=d.repeat||'None';this.setState({draft:{...S.draft,repeat:o[(o.indexOf(c)+1)%o.length]}});};
    v.onCycleReminder=()=>{const o=['None','1 day before','3 days before','1 week before'];const c=d.reminder||'None';this.setState({draft:{...S.draft,reminder:o[(o.indexOf(c)+1)%o.length]}});};
    v.onCyclePaycheck=()=>{const ids=[null,...S.paychecks.map(p=>p.id)];const c=d.pc||null;const idx=ids.indexOf(c);this.setState({draft:{...S.draft,pc:ids[(idx+1)%ids.length]}});};
    v.canDelete=!!d.id;
    v.onDeleteDraft=()=>this.onDeleteDraft();
    v.saveModal=()=>this.saveModal(); v.closeModal=()=>this.closeModal();

    v.showSettings=S.settings;
    return v;
  }
}


/* ===========================================================================
   Boot: instantiate the component, wire it to the template + mount point.
   =========================================================================== */
function boot(){
  var app = new Component();
  app._tmpl = document.getElementById('t');
  app._root = document.getElementById('app');
  app._render();
  app._loadCloud();
  window.__familyCommand = app;   // handy for debugging in the console
}
if (document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();

</script>
</body>
