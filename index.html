<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Family Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:#000;}
  .fc-scroll::-webkit-scrollbar{display:none}
  .fc-scroll{scrollbar-width:none}
  input,textarea,button{font-family:inherit}
  @keyframes fcUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes fcFade{from{opacity:0}to{opacity:1}}
  html{height:100%}
  body{min-height:100%;display:flex;justify-content:center;}
  #app{position:relative;width:100%;max-width:402px;min-height:100vh;background:#000;}
</style>
</head>
<body>

<div id="app"></div>

<template id="t">
<div style="position:relative;width:100%;min-height:100vh;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;overflow:hidden;">

<!-- ============ ONBOARDING ============ -->
<sc-if value="{{ isOnboarding }}" hint-placeholder-val="{{ true }}">
<div style="position:absolute;inset:0;display:flex;flex-direction:column;background:#000;">
  <div style="height:0;"></div>
  <div style="flex:0 0 auto;padding:4px 22px 14px;display:flex;gap:6px;">
    <sc-for list="{{ obDots }}" as="d" hint-placeholder-count="6">
      <div style="height:4px;border-radius:2px;flex:1;background:{{ d.bg }};"></div>
    </sc-for>
  </div>
  <div class="fc-scroll" style="flex:1;overflow-y:auto;padding:8px 22px 16px;">

    <sc-if value="{{ isOb1 }}" hint-placeholder-val="{{ true }}">
      <div style="animation:fcUp .4s ease both;padding-top:32px;">
        <div style="width:64px;height:64px;border-radius:16px;background:#FFD60A;display:flex;align-items:center;justify-content:center;margin-bottom:28px;font-size:34px;">🗒️</div>
        <h1 style="font-size:32px;line-height:1.15;font-weight:700;margin:0 0 16px;letter-spacing:-0.5px;">Let's organize your family dashboard.</h1>
        <p style="font-size:17px;line-height:1.5;color:#AEAEB2;margin:0;">Start with the list you already use. We'll help turn it into reminders, bills, paychecks, deals, and schedules.</p>
        <div style="margin-top:30px;display:flex;flex-direction:column;gap:14px;">
          <sc-for list="{{ obWelcomeRows }}" as="r" hint-placeholder-count="4">
            <div style="display:flex;align-items:center;gap:14px;">
              <div style="width:34px;height:34px;border-radius:9px;background:#1C1C1E;display:flex;align-items:center;justify-content:center;font-size:16px;flex:0 0 auto;">{{ r.icon }}</div>
              <span style="font-size:15px;color:#EBEBF5;">{{ r.text }}</span>
            </div>
          </sc-for>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isOb2 }}" hint-placeholder-val="{{ true }}">
      <div style="animation:fcUp .4s ease both;">
        <h1 style="font-size:28px;font-weight:700;margin:8px 0 6px;letter-spacing:-0.4px;">How do you want to start?</h1>
        <p style="font-size:15px;color:#8E8E93;margin:0 0 22px;">Pick what's easiest. You can change anything later.</p>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <sc-for list="{{ obMethods }}" as="m" hint-placeholder-count="4">
            <button onClick="{{ m.onClick }}" style="{{ m.style }}">
              <div style="width:42px;height:42px;border-radius:11px;background:{{ m.iconBg }};display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;">{{ m.icon }}</div>
              <div style="text-align:left;flex:1;">
                <div style="font-size:16px;font-weight:600;color:#fff;">{{ m.title }}</div>
                <div style="font-size:13px;color:#8E8E93;margin-top:2px;">{{ m.sub }}</div>
              </div>
              <sc-if value="{{ m.selected }}" hint-placeholder-val="{{ true }}"><span style="color:#FFD60A;font-size:20px;">✓</span></sc-if>
            </button>
          </sc-for>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isOb2b }}" hint-placeholder-val="{{ true }}">
      <div style="animation:fcUp .4s ease both;">
        <h1 style="font-size:28px;font-weight:700;margin:8px 0 6px;letter-spacing:-0.4px;">Paste your notes list</h1>
        <p style="font-size:15px;color:#8E8E93;margin:0 0 16px;">From Apple Notes, a text file, or anywhere. We'll sort it out — nothing saves until you approve.</p>
        <textarea value="{{ pasteText }}" onChange="{{ onPasteChange }}" spellcheck="false" style="width:100%;height:230px;background:#1C1C1E;border:1px solid #2C2C2E;border-radius:14px;color:#fff;font-size:15px;line-height:1.7;padding:16px;resize:none;outline:none;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;"></textarea>
        <button onClick="{{ onParse }}" style="margin-top:14px;width:100%;height:50px;border:none;border-radius:13px;background:#FFD60A;color:#000;font-size:16px;font-weight:600;cursor:pointer;">Preview what we found →</button>
      </div>
    </sc-if>

    <sc-if value="{{ isOb3 }}" hint-placeholder-val="{{ true }}">
      <div style="animation:fcUp .4s ease both;">
        <h1 style="font-size:28px;font-weight:700;margin:8px 0 6px;letter-spacing:-0.4px;">When do you get paid?</h1>
        <p style="font-size:15px;color:#8E8E93;margin:0 0 22px;">This is how we'll group your bills into windows.</p>
        <div style="font-size:13px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:.5px;margin:0 4px 10px;">Frequency</div>
        <div style="display:flex;flex-wrap:wrap;gap:9px;margin-bottom:24px;">
          <sc-for list="{{ payFreqOptions }}" as="f" hint-placeholder-count="5">
            <button onClick="{{ f.onClick }}" style="{{ f.style }}">{{ f.label }}</button>
          </sc-for>
        </div>
        <div style="background:#1C1C1E;border-radius:14px;overflow:hidden;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid #2C2C2E;">
            <span style="font-size:16px;">Next paycheck</span><input value="{{ payDate }}" onChange="{{ onPayDate }}" placeholder="YYYY-MM-DD" style="width:140px;text-align:right;background:#2C2C2E;border:none;border-radius:8px;padding:8px 10px;color:#FFD60A;font-size:15px;font-weight:500;outline:none;"/>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid #2C2C2E;">
            <span style="font-size:16px;">Typical amount</span><input value="{{ payAmount }}" onChange="{{ onPayAmount }}" inputmode="decimal" placeholder="0" style="width:140px;text-align:right;background:#2C2C2E;border:none;border-radius:8px;padding:8px 10px;color:#FFD60A;font-size:15px;font-weight:500;outline:none;"/>
          </div>
          <button onClick="{{ onToggleVary }}" style="width:100%;background:none;border:none;display:flex;align-items:center;justify-content:space-between;padding:15px 16px;cursor:pointer;color:#fff;">
            <span style="font-size:16px;">Amount changes each time</span>
            <div style="{{ varyTrackStyle }}"><div style="{{ varyKnobStyle }}"></div></div>
          </button>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isOb4 }}" hint-placeholder-val="{{ true }}">
      <div style="animation:fcUp .4s ease both;">
        <h1 style="font-size:28px;font-weight:700;margin:8px 0 4px;letter-spacing:-0.4px;">Here's what we found</h1>
        <p style="font-size:15px;color:#8E8E93;margin:0 0 18px;">Review before saving. Uncheck anything you don't want.</p>
        <div style="display:flex;flex-direction:column;gap:16px;">
          <sc-for list="{{ parsedBuckets }}" as="b" hint-placeholder-count="6">
            <div>
              <div style="display:flex;align-items:center;gap:8px;margin:0 4px 8px;">
                <span style="width:9px;height:9px;border-radius:3px;background:{{ b.color }};"></span>
                <span style="font-size:13px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.4px;">{{ b.label }}</span>
                <span style="font-size:13px;color:#8E8E93;">{{ b.countStr }}</span>
              </div>
              <div style="background:#1C1C1E;border-radius:14px;overflow:hidden;">
                <sc-for list="{{ b.items }}" as="it" hint-placeholder-count="2">
                  <div style="display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid #2C2C2E;">
                    <button onClick="{{ it.onToggle }}" style="{{ it.checkStyle }}"><sc-if value="{{ it.sel }}" hint-placeholder-val="{{ true }}"><span style="color:#000;font-size:14px;font-weight:700;">✓</span></sc-if></button>
                    <div style="flex:1;min-width:0;">
                      <div style="font-size:15px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ it.title }}</div>
                      <sc-if value="{{ it.hasMeta }}" hint-placeholder-val="{{ true }}"><div style="font-size:13px;color:#8E8E93;margin-top:1px;">{{ it.meta }}</div></sc-if>
                    </div>
                  </div>
                </sc-for>
              </div>
            </div>
          </sc-for>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isOb5 }}" hint-placeholder-val="{{ true }}">
      <div style="animation:fcUp .4s ease both;">
        <h1 style="font-size:28px;font-weight:700;margin:8px 0 6px;letter-spacing:-0.4px;">When should we remind you?</h1>
        <p style="font-size:15px;color:#8E8E93;margin:0 0 22px;">Gentle nudges, never nagging.</p>
        <div style="font-size:13px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:.5px;margin:0 4px 10px;">Lead time</div>
        <div style="background:#1C1C1E;border-radius:14px;overflow:hidden;margin-bottom:24px;">
          <sc-for list="{{ remindLeadOptions }}" as="r" hint-placeholder-count="4">
            <button onClick="{{ r.onClick }}" style="width:100%;background:none;border:none;border-bottom:1px solid #2C2C2E;display:flex;align-items:center;justify-content:space-between;padding:15px 16px;cursor:pointer;color:#fff;">
              <span style="font-size:16px;">{{ r.label }}</span>
              <div style="{{ r.track }}"><div style="{{ r.knob }}"></div></div>
            </button>
          </sc-for>
        </div>
        <div style="font-size:13px;font-weight:600;color:#8E8E93;text-transform:uppercase;letter-spacing:.5px;margin:0 4px 10px;">Remind me about</div>
        <div style="display:flex;flex-wrap:wrap;gap:9px;">
          <sc-for list="{{ remindTypeChips }}" as="c" hint-placeholder-count="5">
            <button onClick="{{ c.onClick }}" style="{{ c.style }}">{{ c.label }}</button>
          </sc-for>
        </div>
      </div>
    </sc-if>

    <sc-if value="{{ isOb6 }}" hint-placeholder-val="{{ true }}">
      <div style="animation:fcUp .4s ease both;">
        <h1 style="font-size:28px;font-weight:700;margin:8px 0 6px;letter-spacing:-0.4px;">What should open first?</h1>
        <p style="font-size:15px;color:#8E8E93;margin:0 0 22px;">Your home base. Switch anytime from the tab bar.</p>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <sc-for list="{{ homeViewOptions }}" as="h" hint-placeholder-count="4">
            <button onClick="{{ h.onClick }}" style="{{ h.style }}">
              <div style="width:42px;height:42px;border-radius:11px;background:{{ h.iconBg }};display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;">{{ h.icon }}</div>
              <div style="text-align:left;flex:1;">
                <div style="font-size:16px;font-weight:600;color:#fff;">{{ h.title }}</div>
                <div style="font-size:13px;color:#8E8E93;margin-top:2px;">{{ h.sub }}</div>
              </div>
              <sc-if value="{{ h.selected }}" hint-placeholder-val="{{ true }}"><span style="color:#FFD60A;font-size:20px;">✓</span></sc-if>
            </button>
          </sc-for>
        </div>
      </div>
    </sc-if>

  </div>
  <div style="flex:0 0 auto;padding:12px 22px calc(20px + env(safe-area-inset-bottom));display:flex;gap:12px;background:linear-gradient(to top,#000 60%,transparent);">
    <sc-if value="{{ obCanBack }}" hint-placeholder-val="{{ true }}">
      <button onClick="{{ obBack }}" style="height:52px;padding:0 22px;border:none;border-radius:14px;background:#1C1C1E;color:#fff;font-size:16px;font-weight:600;cursor:pointer;">Back</button>
    </sc-if>
    <button onClick="{{ obNext }}" style="flex:1;height:52px;border:none;border-radius:14px;background:#FFD60A;color:#000;font-size:17px;font-weight:600;cursor:pointer;">{{ obNextLabel }}</button>
  </div>
</div>
</sc-if>

<!-- ============ APP ============ -->
<sc-if value="{{ isApp }}" hint-placeholder-val="{{ true }}">
<div style="position:absolute;inset:0;display:flex;flex-direction:column;background:#000;">
  <div style="height:0;"></div></div>
  <div style="flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;padding:6px 20px 10px;background:#000;">
    <h1 style="font-size:30px;font-weight:700;margin:0;letter-spacing:-0.5px;">{{ tabTitle }}</h1>
    <div style="display:flex;gap:10px;">
      <button onClick="{{ openSettings }}" style="width:38px;height:38px;border:none;border-radius:50%;background:#1C1C1E;color:#FFD60A;font-size:17px;cursor:pointer;">⚙</button>
      <button onClick="{{ onQuickAdd }}" style="width:38px;height:38px;border:none;border-radius:50%;background:#FFD60A;color:#000;font-size:24px;font-weight:300;line-height:1;cursor:pointer;">+</button>
    </div>
  </div>
  <div class="fc-scroll" style="flex:1;overflow-y:auto;padding:4px 16px 110px;">

    <!-- TODAY -->
    <sc-if value="{{ isToday }}" hint-placeholder-val="{{ true }}">
      <div style="animation:fcFade .3s ease both;display:flex;flex-direction:column;gap:18px;">
        <div style="background:linear-gradient(160deg,#2C2A12,#1C1C1E);border:1px solid #38371A;border-radius:20px;padding:18px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:13px;font-weight:700;color:#FFD60A;text-transform:uppercase;letter-spacing:.5px;">Current Paycheck Window</span>
            <span style="font-size:13px;color:#8E8E93;">{{ pc.windowStr }}</span>
          </div>
          <div style="display:flex;align-items:baseline;gap:8px;margin:12px 0 4px;">
            <span style="font-size:38px;font-weight:700;letter-spacing:-1px;">{{ pc.leftStr }}</span>
            <span style="font-size:15px;color:#8E8E93;">left to spend</span>
          </div>
          <div style="height:8px;border-radius:4px;background:#000;overflow:hidden;margin:10px 0 14px;display:flex;">
            <div style="width:{{ pc.spentPct }};background:#FF9F0A;"></div>
            <div style="width:{{ pc.paidPct }};background:#30D158;"></div>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <sc-for list="{{ pc.stats }}" as="s" hint-placeholder-count="3">
              <div><div style="font-size:12px;color:#8E8E93;">{{ s.label }}</div><div style="font-size:17px;font-weight:600;color:{{ s.color }};margin-top:2px;">{{ s.value }}</div></div>
            </sc-for>
          </div>
          <div style="margin-top:12px;font-size:13px;color:#8E8E93;">Next paycheck {{ pc.nextStr }} · {{ pc.countStr }}</div>
        </div>

        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin:0 4px 8px;">
            <span style="font-size:13px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:.5px;">Due Soon</span>
            <button onClick="{{ goMoney }}" style="background:none;border:none;color:#FFD60A;font-size:14px;cursor:pointer;">All bills</button>
          </div>
          <div style="background:#1C1C1E;border-radius:16px;overflow:hidden;">
            <sc-for list="{{ dueSoon }}" as="it" hint-placeholder-count="3">
              <div style="display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid #2C2C2E;">
                <button onClick="{{ it.onToggle }}" style="{{ it.checkStyle }}"><sc-if value="{{ it.paid }}" hint-placeholder-val="{{ true }}"><span style="color:#000;font-size:15px;font-weight:700;">✓</span></sc-if></button>
                <div onClick="{{ it.onOpen }}" style="flex:1;min-width:0;cursor:pointer;">
                  <div style="{{ it.titleStyle }}">{{ it.title }}</div>
                  <div style="font-size:13px;color:{{ it.metaColor }};margin-top:1px;">{{ it.metaStr }}</div>
                </div>
                <span style="{{ it.amountStyle }}">{{ it.amountStr }}</span>
              </div>
            </sc-for>
          </div>
        </div>

        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin:0 4px 8px;">
            <span style="font-size:13px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:.5px;">Deals Expiring Soon</span>
            <button onClick="{{ goDeals }}" style="background:none;border:none;color:#FFD60A;font-size:14px;cursor:pointer;">All deals</button>
          </div>
          <div style="background:#1C1C1E;border-radius:16px;overflow:hidden;">
            <sc-for list="{{ dealsExp }}" as="d" hint-placeholder-count="3">
              <div onClick="{{ d.onOpen }}" style="display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid #2C2C2E;cursor:pointer;">
                <div style="width:34px;height:34px;border-radius:9px;background:{{ d.catBg }};display:flex;align-items:center;justify-content:center;font-size:17px;flex:0 0 auto;">{{ d.icon }}</div>
                <div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:500;">{{ d.title }}</div><div style="font-size:13px;color:#8E8E93;">{{ d.store }}</div></div>
                <div style="text-align:right;"><div style="font-size:13px;font-weight:600;color:{{ d.expColor }};">{{ d.expStr }}</div><div style="font-size:12px;color:#30D158;">{{ d.savingsStr }}</div></div>
              </div>
            </sc-for>
          </div>
        </div>

        <div>
          <div style="font-size:13px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:.5px;margin:0 4px 8px;">Family Reminders</div>
          <div style="background:#1C1C1E;border-radius:16px;overflow:hidden;">
            <sc-for list="{{ famReminders }}" as="t" hint-placeholder-count="3">
              <div style="display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid #2C2C2E;">
                <button onClick="{{ t.onToggle }}" style="{{ t.checkStyle }}"><sc-if value="{{ t.paid }}" hint-placeholder-val="{{ true }}"><span style="color:#000;font-size:15px;font-weight:700;">✓</span></sc-if></button>
                <span style="{{ t.titleStyle }}">{{ t.title }}</span>
              </div>
            </sc-for>
          </div>
        </div>
      </div>
    </sc-if>

    <!-- MONEY -->
    <sc-if value="{{ isMoney }}" hint-placeholder-val="{{ true }}">
      <div style="animation:fcFade .3s ease both;">
        <div style="display:flex;gap:8px;overflow-x:auto;padding:2px 0 14px;" class="fc-scroll">
          <sc-for list="{{ moneySubs }}" as="s" hint-placeholder-count="5">
            <button onClick="{{ s.onClick }}" style="{{ s.style }}">{{ s.label }}</button>
          </sc-for>
        </div>

        <sc-if value="{{ isMoneyPay }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex;flex-direction:column;gap:14px;">
            <sc-for list="{{ paychecks }}" as="p" hint-placeholder-count="3">
              <div onClick="{{ p.onOpen }}" style="background:#1C1C1E;border:1px solid {{ p.border }};border-radius:18px;padding:16px;cursor:pointer;">
                <div style="display:flex;align-items:center;justify-content:space-between;">
                  <div><div style="font-size:18px;font-weight:700;">{{ p.dateStr }}</div><div style="font-size:13px;color:#8E8E93;">{{ p.windowStr }}</div></div>
                  <div style="text-align:right;"><div style="font-size:13px;color:#8E8E93;">Income</div><div style="font-size:18px;font-weight:700;color:#30D158;">{{ p.amountStr }}</div></div>
                </div>
                <div style="height:7px;border-radius:4px;background:#000;overflow:hidden;margin:14px 0 12px;display:flex;">
                  <div style="width:{{ p.paidPct }};background:#30D158;"></div><div style="width:{{ p.unpaidPct }};background:#FF9F0A;"></div>
                </div>
                <div style="display:flex;justify-content:space-between;">
                  <div><div style="font-size:12px;color:#8E8E93;">Planned</div><div style="font-size:15px;font-weight:600;">{{ p.plannedStr }}</div></div>
                  <div><div style="font-size:12px;color:#8E8E93;">Paid</div><div style="font-size:15px;font-weight:600;color:#30D158;">{{ p.paidStr }}</div></div>
                  <div><div style="font-size:12px;color:#8E8E93;">Unpaid</div><div style="font-size:15px;font-weight:600;color:#FF9F0A;">{{ p.unpaidStr }}</div></div>
                  <div><div style="font-size:12px;color:#8E8E93;">Left</div><div style="font-size:15px;font-weight:600;color:{{ p.leftColor }};">{{ p.leftStr }}</div></div>
                </div>
              </div>
            </sc-for>
          </div>
        </sc-if>

        <sc-if value="{{ isMoneyBills }}" hint-placeholder-val="{{ true }}">
          <div style="background:#1C1C1E;border-radius:16px;overflow:hidden;">
            <sc-for list="{{ billsList }}" as="it" hint-placeholder-count="5">
              <div style="display:flex;align-items:center;gap:13px;padding:13px 15px;border-bottom:1px solid #2C2C2E;">
                <button onClick="{{ it.onToggle }}" style="{{ it.checkStyle }}"><sc-if value="{{ it.paid }}" hint-placeholder-val="{{ true }}"><span style="color:#000;font-size:15px;font-weight:700;">✓</span></sc-if></button>
                <div onClick="{{ it.onOpen }}" style="flex:1;min-width:0;cursor:pointer;"><div style="{{ it.titleStyle }}">{{ it.title }}</div><div style="font-size:13px;color:{{ it.metaColor }};margin-top:1px;">{{ it.metaStr }}</div></div>
                <span style="{{ it.amountStyle }}">{{ it.amountStr }}</span>
              </div>
            </sc-for>
          </div>
        </sc-if>

        <sc-if value="{{ isMoneyEvents }}" hint-placeholder-val="{{ true }}">
          <div style="background:#1C1C1E;border-radius:16px;overflow:hidden;">
            <sc-for list="{{ eventsList }}" as="it" hint-placeholder-count="3">
              <div onClick="{{ it.onOpen }}" style="display:flex;align-items:center;gap:13px;padding:14px 15px;border-bottom:1px solid #2C2C2E;cursor:pointer;">
                <div style="width:34px;height:34px;border-radius:9px;background:{{ it.catBg }};display:flex;align-items:center;justify-content:center;font-size:17px;flex:0 0 auto;">{{ it.icon }}</div>
                <div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:500;">{{ it.title }}</div><div style="font-size:13px;color:#8E8E93;">{{ it.metaStr }}</div></div>

<script>
(function(){
'use strict';

/* ===========================================================================
   Minimal Claude Design Component (.dc) runtime
   Implements just enough of the template engine to run this component
   standalone: {{ expr }} interpolation, <sc-if>, <sc-for>, onClick/onChange
   event binding, dynamic style (string or object), and value binding.
   =========================================================================== */

// Resolve a dotted path ("a.b.c") against a context object (prototype-aware).
function resolve(path, ctx){
  var parts = path.trim().split('.');
  var v = ctx;
  for (var i = 0; i < parts.length; i++){
    if (v == null) return undefined;
    v = v[parts[i]];
  }
  return v;
}

// Strip the {{ }} delimiters from a single-expression attribute value.
function stripTpl(s){
  return (s || '').trim().replace(/^\{\{\s*/, '').replace(/\s*\}\}$/, '');
}

// Interpolate every {{ path }} occurrence inside a string.
function interp(str, ctx){
  return str.replace(/\{\{\s*([\w.]+)\s*\}\}/g, function(_m, p){
    var v = resolve(p, ctx);
    return v != null ? v : '';
  });
}

// Apply a style value that may be a CSS string or a JS style object.
function applyStyle(el, val){
  if (typeof val === 'string') el.setAttribute('style', val);
  else if (val && typeof val === 'object') Object.assign(el.style, val);
}

// True when the whole attribute value is a single {{ path }} expression.
var SINGLE = /^\{\{\s*[\w.]+\s*\}\}$/;

// Recursively process a template node against a context, returning live DOM.
function proc(node, ctx){
  // Text node — interpolate if it contains a template expression.
  if (node.nodeType === 3){
    var t = node.textContent;
    return document.createTextNode(t.indexOf('{{') >= 0 ? interp(t, ctx) : t);
  }
  if (node.nodeType !== 1) return null;

  var tag = node.tagName.toLowerCase();

  // <sc-if value="{{ cond }}"> — conditional render.
  if (tag === 'sc-if'){
    if (!resolve(stripTpl(node.getAttribute('value')), ctx)){
      return document.createDocumentFragment();
    }
    var fIf = document.createDocumentFragment();
    for (var i = 0; i < node.childNodes.length; i++){
      var rIf = proc(node.childNodes[i], ctx);
      if (rIf) fIf.appendChild(rIf);
    }
    return fIf;
  }

  // <sc-for list="{{ arr }}" as="item"> — list render with scoped context.
  if (tag === 'sc-for'){
    var list = resolve(stripTpl(node.getAttribute('list')), ctx);
    var as_ = node.getAttribute('as') || 'item';
    var fFor = document.createDocumentFragment();
    if (Array.isArray(list)){
      for (var k = 0; k < list.length; k++){
        var ic = Object.create(ctx);     // child scope shadows outer ctx
        ic[as_] = list[k];
        for (var j = 0; j < node.childNodes.length; j++){
          var rFor = proc(node.childNodes[j], ic);
          if (rFor) fFor.appendChild(rFor);
        }
      }
    }
    return fFor;
  }

  // Regular element.
  var el = document.createElement(tag);
  var pendingVal;
  for (var a = 0; a < node.attributes.length; a++){
    var attr = node.attributes[a];
    var n = attr.name, v = attr.value;

    if (n.indexOf('hint-') === 0) continue;          // design-only hints

    // Static attribute (no template) — copy through, skip literal handlers.
    if (v.indexOf('{{') < 0){
      if (!/^on[A-Za-z]/.test(n)) el.setAttribute(n, v);
      continue;
    }

    var single = SINGLE.test(v.trim());
    var resolved = single ? resolve(stripTpl(v), ctx) : null;
    var ln = n.toLowerCase();

    // which avoids tearing down focused inputs on every keystroke).
    if (ln.indexOf('on') === 0){

        for (var e = 0; e < evs.length; e++) el.addEventListener(evs[e], resolved);
      }
      continue;
    }

    if (n === 'style'){ applyStyle(el, single ? resolved : interp(v, ctx)); continue; }
    if (n === 'value' && single){ pendingVal = resolved; continue; }

    var val = single ? resolved : interp(v, ctx);
    if (val != null) el.setAttribute(n, String(val));
  }

  for (var c = 0; c < node.childNodes.length; c++){
    var rc = proc(node.childNodes[c], ctx);
    if (rc) el.appendChild(rc);
  }

  // Inputs/textareas need their value set as a property, not an attribute.
  if (pendingVal != null) el.value = String(pendingVal);

}

/* ===========================================================================
   DCLogic base class — state + batched re-render lifecycle.
   =========================================================================== */
class DCLogic {
  constructor(){ this._pend = false; }

  setState(u){
    var next = (typeof u === 'function') ? u(this.state) : u;
    this.state = Object.assign({}, this.state, next);
    if (!this._pend){
      this._pend = true;
      requestAnimationFrame(function(self){ return function(){ self._pend = false; self._render(); }; }(this));
    }
  }

  _render(){
    var vals = this.renderVals();
    var clone = this._tmpl.content.cloneNode(true);
    var f = document.createDocumentFragment();
    for (var i = 0; i < clone.childNodes.length; i++){
      var r = proc(clone.childNodes[i], vals);
      if (r) f.appendChild(r);
    }
    this._root.textContent = '';
    this._root.appendChild(f);
  }
}


/* ======================= component (v2) ======================= */

  state = this.build();

  _DKEYS = ['items','paychecks','deals','activities','lists','savingsGoals','kids','schoolItems','payday','remindLead','remindTypes','homeView','onboarded'];
  _load(){ try{ const r=localStorage.getItem('familyCommand.v2'); return r?JSON.parse(r):null; }catch(e){ return null; } }
  _persist(){ try{ const o={}; this._DKEYS.forEach(k=>o[k]=this.state[k]); localStorage.setItem('familyCommand.v2', JSON.stringify(o)); }catch(e){} }

  setState(u){ super.setState(u); this._persist(); }

  build() {
    const items = [];
    const paychecks = [];
    const deals = [];
    const activities = [];
    const lists = [];
    const savingsGoals = [];
    const kids = [];
    const schoolItems = [];
    const payday = {date:'',amount:'',freq:'biweekly',vary:false};
    const DEFAULT_NOTE = '';

    const seed = {items,paychecks,deals,activities,lists,savingsGoals,kids,schoolItems,payday,
      remindLead:{d1:true,d3:true,d7:false,custom:false}, remindTypes:{bill:true,deal:true,appt:true,reg:true,pay:false},

  // ---- date helpers ----
  pad(n){ return String(n).padStart(2,'0'); }
  iso(d){ return d.getFullYear()+'-'+this.pad(d.getMonth()+1)+'-'+this.pad(d.getDate()); }
  today(){ return this.iso(new Date()); }
  addDays(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return this.iso(d); }

  // ---- display helpers ----
  money(n){ if(n==null||isNaN(n)) return ''; return '$'+Number(n).toLocaleString('en-US'); }
  md(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  wd(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); }
  daysUntil(iso){ if(!iso) return 999; return Math.round((new Date(iso+'T00:00:00')-new Date(this.today()+'T00:00:00'))/86400000); }
  catColor(c){ return ({housing:'#FF453A',utilities:'#0A84FF',medical:'#5AC8FA',auto:'#FF9F0A',groceries:'#30D158',activity:'#BF5AF2',family:'#FFD60A',school:'#BF5AF2',kids:'#FF9F0A',household:'#8E8E93'})[c]||'#FFD60A'; }
  catBg(c){ const h=this.catColor(c); return h+'22'; }
  catIcon(c){ return ({housing:'🏠',utilities:'⚡',medical:'🦷',auto:'🚗',groceries:'🛒',activity:'⚽',family:'⭐',school:'🎒',kids:'👕',household:'🧴'})[c]||'📌'; }
  dealIcon(c){ return ({groceries:'🛒',kids:'👕',family:'🎟️',household:'🧴',medical:'🦷'})[c]||'🏷️'; }
  actIcon(t){ return ({Soccer:'⚽',Swimming:'🏊',Gymnastics:'🤸',Tennis:'🎾'})[t]||'🏅'; }
  pickColor(){ const p=['#FF9F0A','#30D158','#FF453A','#0A84FF','#BF5AF2','#5AC8FA','#FFD60A']; const n=this.state&&this.state.kids?this.state.kids.length:0; return p[n%p.length]; }

  chkStyle(paid){ const b={width:'26px',height:'26px',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',flex:'0 0 auto',cursor:'pointer',border:'2px solid #48484A',background:'transparent',padding:'0'}; return paid?{...b,border:'2px solid #FFD60A',background:'#FFD60A'}:b; }
  titleStyle(paid){ return paid?{fontSize:'15px',textDecoration:'line-through',color:'#8E8E93'}:{fontSize:'15px',color:'#fff'}; }
  amtStyle(paid){ return {fontSize:'15px',fontWeight:'600',color:paid?'#8E8E93':'#fff'}; }
  metaColor(it){ if(it.paid) return '#8E8E93'; const d=this.daysUntil(it.dueDate); return d<=3?'#FF9F0A':'#8E8E93'; }
  billMeta(it){ if(it.paid) return 'Paid '+this.md(it.paidDate||it.dueDate); if(!it.dueDate) return ''; const d=this.daysUntil(it.dueDate); return d<0?'Overdue':(d===0?'Due today':(d===1?'Due tomorrow':'Due '+this.md(it.dueDate))); }

  chkVm(it){ const paid=!!it.paid; return {id:it.id,title:it.title,paid,amountStr:this.money(it.amount),metaStr:this.billMeta(it),metaColor:this.metaColor(it),checkStyle:this.chkStyle(paid),titleStyle:this.titleStyle(paid),amountStyle:this.amtStyle(paid),onToggle:()=>this.togglePaid(it.id),onOpen:()=>this.openModal(it.id)}; }

  pcCalc(pc){ const its=this.state.items.filter(i=>i.pc===pc.id&&i.amount); const planned=its.reduce((s,i)=>s+i.amount,0); const paid=its.filter(i=>i.paid).reduce((s,i)=>s+i.amount,0); const unpaid=planned-paid; const left=pc.amount-planned; const uc=its.filter(i=>!i.paid).length; const pcnt=its.filter(i=>i.paid).length; return {planned,paid,unpaid,left,uc,pcnt,its}; }

  // ---- paycheck scheduling ----
  generatePaychecks(payday){
    const freq=payday.freq||'biweekly'; const amount=+payday.amount||0; const base=payday.date||this.today(); const out=[];
    if(freq==='monthly'){
      let d=new Date(base+'T00:00:00'); d.setMonth(d.getMonth()-1);
      for(let i=0;i<10;i++){ const start=this.iso(d); const e=new Date(d); e.setMonth(e.getMonth()+1); e.setDate(e.getDate()-1); out.push({id:'pc_'+start,date:start,amount,start,end:this.iso(e)}); d.setMonth(d.getMonth()+1); }
    } else {
      const step = freq==='weekly'?7:(freq==='twicemonthly'?15:14);
      let d=new Date(base+'T00:00:00'); d.setDate(d.getDate()-step);
      for(let i=0;i<12;i++){ const start=this.iso(d); const e=new Date(d); e.setDate(e.getDate()+step-1); out.push({id:'pc_'+start,date:start,amount,start,end:this.iso(e)}); d.setDate(d.getDate()+step); }
    }

  }
  assignPc(items,paychecks){ return items.map(i=>{ if(!i.dueDate) return {...i,pc:(i.pc&&paychecks.find(p=>p.id===i.pc))?i.pc:null}; const w=paychecks.find(p=>i.dueDate>=p.start&&i.dueDate<=p.end); return {...i,pc:w?w.id:null}; }); }
  planningPaycheck(){ const t=this.today(); const fut=this.state.paychecks.filter(p=>p.end>=t).sort((a,b)=>a.start.localeCompare(b.start)); const withItems=fut.find(p=>this.state.items.some(i=>i.pc===p.id&&i.amount)); return withItems||fut[0]||this.state.paychecks[this.state.paychecks.length-1]||null; }

  parseNote(text){
    const lines=(text||'').split('\n').map(l=>l.trim()).filter(Boolean);
    const amtRe=/\$?\b(\d{2,4})\b/; const dateRe=/\b(\d{1,2})\/(\d{1,2})\b/;
    return lines.map((line,_i)=>{
      const low=line.toLowerCase(); const dm=line.match(dateRe); const date=dm?dm[0]:null;
      let type='unknown',title=line,amount=null;
      if(low.includes('paycheck')){type='paycheck';title='Paycheck';}
      else if(low.includes('paid')){type='paid';title=line.replace(/paid/i,'').trim();}
      else if(low.includes('due')){type='bill';const am=line.match(amtRe);amount=am?+am[1]:null;title=line.replace(amtRe,'').replace(/due.*$/i,'').trim();}
      else if(low.includes('coupon')||low.includes('deal')||low.includes('% off')||low.includes('expires')||low.includes('groupon')){type='deal';title=line;}
      else if(low.startsWith('check')||low.startsWith('call')||low.startsWith('look')||low.includes('signup')){type='task';title=line;}
      else if(low.includes('dentist')||low.includes('doctor')||low.includes('appointment')||(dm&&amtRe.test(line))){type='event';const am=line.match(amtRe);amount=am?+am[1]:null;title=line.replace(amtRe,'').replace(dateRe,'').trim();}
      return {type,title:title||line,amount,date,raw:line,_i};
    });
  }

  saveModal(){
    const d=this.state.draft; if(!d){ this.setState({modal:null}); return; }

    if(t==='school'){ const rec={id:id||'sc'+Date.now(),title:d.title||'Item',meta:d.note||''}; this.setState(s=>({schoolItems:id?s.schoolItems.map(x=>x.id===id?{...x,...rec}:x):[...s.schoolItems,rec],modal:null,draft:null})); return; }

  pickFile(){ const inp=document.createElement('input'); inp.type='file'; inp.accept='.txt,.md,text/plain,text/markdown'; inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f) return; const rd=new FileReader(); rd.onload=()=>{ const text=String(rd.result||''); const parsed=this.parseNote(text); const sel={}; parsed.forEach(p=>sel[p._i]=true); this.setState({pasteText:text,parsed,parsedSel:sel,obMethod:'paste',obStep:2.5}); }; rd.readAsText(f); }; inp.click(); }

  importParsed(){
    const s=this.state; const sel=s.parsedSel||{}; const parsed=(s.parsed||[]).filter(p=>sel[p._i]!==false&&p.type!=='unknown'&&p.type!=='paycheck');
    const has=(arr,t)=>arr.some(x=>(x.title||x.name||'').toLowerCase()===t.toLowerCase());
    const newItems=[]; const newDeals=[]; let seq=0;

    const knobOff={width:'25px',height:'25px',borderRadius:'50%',background:'#fff',position:'absolute',top:'2px',left:'2px',transition:'.2s'};

    // ob2 methods
    const methods=[{key:'paste',icon:'📋',title:'Paste my notes list',sub:'From Apple Notes or anywhere'},{key:'upload',icon:'📄',title:'Upload a .txt or .md file',sub:'We parse it for you'},{key:'manual',icon:'✏️',title:'Start manually',sub:'Add items one at a time'},{key:'email',icon:'📧',title:'Connect email later',sub:'For deals & reminders'}];
    v.obMethods=methods.map(m=>{const sel=S.obMethod===m.key;return {...m,selected:sel,iconBg:sel?'#FFD60A':'#2C2C2E',onClick:()=>this.setState({obMethod:m.key}),style:`width:100%;display:flex;align-items:center;gap:14px;background:#1C1C1E;border:1.5px solid ${sel?'#FFD60A':'transparent'};border-radius:15px;padding:14px;cursor:pointer;`};});

    // ob3 payday
    const freqs=[{key:'weekly',label:'Weekly'},{key:'biweekly',label:'Biweekly'},{key:'twicemonthly',label:'Twice monthly'},{key:'monthly',label:'Monthly'},{key:'custom',label:'Custom'}];
    v.payFreqOptions=freqs.map(f=>{const sel=S.payday.freq===f.key;return {...f,onClick:()=>this.setState({payday:{...S.payday,freq:f.key}}),style:`padding:10px 16px;border-radius:11px;border:1.5px solid ${sel?'#FFD60A':'#2C2C2E'};background:${sel?'#FFD60A':'#1C1C1E'};color:${sel?'#000':'#fff'};font-size:15px;font-weight:600;cursor:pointer;`};});
    v.payDate=S.payday.date||''; v.payAmount=S.payday.amount!=null?String(S.payday.amount):'';
    v.onPayDate=e=>this.setState({payday:{...S.payday,date:e.target.value}});
    v.onPayAmount=e=>this.setState({payday:{...S.payday,amount:e.target.value===''?'':(+e.target.value||0)}});

    v.appointmentsList=S.items.filter(i=>i.type==='appointment').map(i=>({title:i.title,metaStr:(i.note||'')+' · '+this.md(i.dueDate),icon:this.catIcon(i.category),catBg:this.catBg(i.category),right:i.time||'',onOpen:()=>this.openModal(i.id)}));
    const rcols=[['researching','Researching'],['interested','Interested'],['contacted','Contacted']];
    v.researchCols=rcols.map(([k,label])=>{const its=S.activities.filter(a=>a.status===k);return {label,count:its.length,items:its.map(a=>({title:a.title,org:a.org,icon:this.actIcon(a.atype),onOpen:()=>this.openOverlay('activity',a.id)}))};}).filter(c=>c.count>0);
    v.schoolList=S.schoolItems.map(x=>({title:x.title,metaStr:x.meta,onOpen:()=>this.openSchool(x.id)}));
    v.onAddSchool=()=>this.openSchool(null);
    v.showActivityOv=!!ov&&ov.kind==='activity';
    if(v.showActivityOv){const a=S.activities.find(x=>x.id===ov.id);const linkedDeal=a.deal?S.deals.find(d=>d.id===a.deal):null;v.ovAct={icon:this.actIcon(a.atype),catBg:'#BF5AF222',title:a.title,org:a.org,statusLabel:a.status,statusStyle:actStatusStyle(a.status),hasDeal:!!linkedDeal,dealStr:linkedDeal?(linkedDeal.title+' · save '+this.money(linkedDeal.savings)):'',rows:[{label:'Sport',value:a.atype,color:'#fff'},{label:'Ages',value:a.age||'—',color:'#fff'},{label:'Season',value:a.season||'—',color:'#fff'},{label:'Cost',value:this.money(a.cost),color:'#30D158'},{label:'Location',value:(a.loc||'—')+(a.dist?' · '+a.dist:''),color:'#fff'},{label:'Signup deadline',value:a.deadline?this.md(a.deadline):'Rolling',color:'#FFD60A'},{label:'Practice',value:a.practice||'—',color:'#fff'},{label:'Equipment',value:a.equip||'—',color:'#fff'},{label:'Contact',value:a.contact||'—',color:'#0A84FF'},{label:'Notes',value:a.notes||'—',color:'#fff'}],actions:[{icon:'✏️',label:'Edit activity details',onClick:()=>this.openActivityEdit(a.id)},{icon:'📅',label:'Add signup deadline to calendar',onClick:()=>{if(a.deadline)this.setState({selectedDate:a.deadline,calYear:+a.deadline.slice(0,4),calMonth0:+a.deadline.slice(5,7)-1,tab:'calendar',overlay:null});}},{icon:'💵',label:'Add registration fee as financial event',onClick:()=>{const dd=a.deadline||'';const w=S.paychecks.find(p=>dd>=p.start&&dd<=p.end);this.setState(s=>({items:[...s.items,{id:'reg'+Date.now(),type:'event',title:a.title+' registration',amount:a.cost||null,dueDate:dd,paid:false,category:'activity',pc:w?w.id:null}],overlay:null,tab:'money',moneySub:'events'}));}},{icon:'📞',label:'Mark as contacted',onClick:()=>{this.setState(s=>({activities:s.activities.map(x=>x.id===a.id?{...x,status:'contacted'}:x)}));}},{icon:'✅',label:'Mark as registered',onClick:()=>{this.setState(s=>({activities:s.activities.map(x=>x.id===a.id?{...x,status:'registered'}:x)}));}}]};} else v.ovAct={rows:[],actions:[]};

    // Lists
    const q=(S.listQuery||'').trim().toLowerCase();
    v.listQuery=S.listQuery; v.onListSearch=e=>this.setState({listQuery:e.target.value});
    v.listFolders=S.lists.filter(l=>!q||l.name.toLowerCase().includes(q)||l.itemIds.some(id=>{const it=S.items.find(i=>i.id===id);return it&&it.title.toLowerCase().includes(q);})).map(l=>({id:l.id,name:l.name,icon:l.icon,color:l.color,count:l.itemIds.length+'',onOpen:()=>this.openOverlay('note',l.id)}));
    v.showNoteOv=!!ov&&ov.kind==='note';
    if(v.showNoteOv){const l=S.lists.find(x=>x.id===ov.id);const its=(l.itemIds||[]).map(id=>S.items.find(i=>i.id===id)).filter(Boolean);v.ovNote={title:l.name,dateStr:this.wd(this.today())+' · '+its.length+' items',items:its.map(i=>{const paid=!!i.paid;return {id:i.id,title:i.title+(i.amount?'  '+this.money(i.amount):''),paid,checkStyle:this.chkStyle(paid),titleStyle:this.titleStyle(paid),convertTo:({bill:'bill',event:'event',appointment:'appointment',task:'reminder'})[i.type]||'item',onToggle:()=>this.togglePaid(i.id),onConvert:()=>this.openModal(i.id)};})};} else v.ovNote={items:[]};

    // Modal
    v.showModal=!!S.modal; const d=S.draft||{};
    const tLabels={bill:'bill',event:'event',task:'task',appointment:'appointment',deal:'deal',activity:'activity',savings:'savings goal',kid:'child',school:'school item',list:'list',paycheck:'paycheck'};
    v.modalTitle=(d.id?'Edit ':'New ')+(tLabels[d.type]||'item');
    const mtypes=[{key:'bill',label:'Bill'},{key:'paycheck',label:'Paycheck'},{key:'appointment',label:'Appointment'},{key:'deal',label:'Deal'},{key:'activity',label:'Activity'},{key:'task',label:'Task'},{key:'event',label:'Event'},{key:'savings',label:'Savings'}];
    v.modalTypes=mtypes.map(t=>({...t,onClick:()=>this.setState({draft:{...S.draft,type:t.key}}),style:`padding:8px 15px;border-radius:18px;white-space:nowrap;border:none;background:${d.type===t.key?'#FFD60A':'#2C2C2E'};color:${d.type===t.key?'#000':'#fff'};font-size:14px;font-weight:600;cursor:pointer;`}));
    const PH={ bill:['Title','Amount','Due date (YYYY-MM-DD)','Notes'], event:['Title','Amount','Date (YYYY-MM-DD)','Notes'], task:['Task name','','','Notes'], appointment:['Title','','Date (YYYY-MM-DD)','Notes / location'], deal:['Deal title','Savings $','Expires (YYYY-MM-DD)','Store'], activity:['Activity title','Cost $','Signup deadline (YYYY-MM-DD)','Organization'], savings:['Goal name','Target $','Saved so far $','Notes'], kid:["Child's name",'Age (e.g. 5 yrs)','','Notes'], school:['School item','','','Detail (e.g. Due Aug 1)'], list:['List name','','','Notes'], paycheck:['Label (optional)','Amount','Pay date (YYYY-MM-DD)','Notes'] };
    const ph=PH[d.type]||PH.bill;
    v.ph1=ph[0]; v.ph2=ph[1]; v.ph3=ph[2]; v.ph4=ph[3];
    v.draftTitle=d.title||''; v.draftAmount=d.amount!=null?String(d.amount):''; v.draftDate=d.dueDate||''; v.draftNote=d.note||'';
    v.onDraftTitle=e=>this.setState({draft:{...S.draft,title:e.target.value}});
    v.onDraftAmount=e=>this.setState({draft:{...S.draft,amount:e.target.value}});
    v.onDraftDate=e=>this.setState({draft:{...S.draft,dueDate:e.target.value}});
    v.onDraftNote=e=>this.setState({draft:{...S.draft,note:e.target.value}});
    v.draftRepeat=d.repeat||'None';
    v.draftReminder=d.reminder||'None';
    v.draftPaycheckLabel=(()=>{ if(!d.pc) return 'None'; const p=S.paychecks.find(x=>x.id===d.pc); return p?this.md(p.date):'None'; })();
    v.onCycleRepeat=()=>{const o=['None','Weekly','Biweekly','Monthly','Yearly'];const c=d.repeat||'None';this.setState({draft:{...S.draft,repeat:o[(o.indexOf(c)+1)%o.length]}});};
    v.onCycleReminder=()=>{const o=['None','1 day before','3 days before','1 week before'];const c=d.reminder||'None';this.setState({draft:{...S.draft,reminder:o[(o.indexOf(c)+1)%o.length]}});};
    v.onCyclePaycheck=()=>{const ids=[null,...S.paychecks.map(p=>p.id)];const c=d.pc||null;const idx=ids.indexOf(c);this.setState({draft:{...S.draft,pc:ids[(idx+1)%ids.length]}});};
    v.canDelete=!!d.id;
    v.onDeleteDraft=()=>this.onDeleteDraft();
    v.saveModal=()=>this.saveModal(); v.closeModal=()=>this.closeModal();

    v.showSettings=S.settings;
    return v;
  }
}

/* ===========================================================================
   Boot: instantiate the component, wire it to the template + mount point.
   =========================================================================== */
function boot(){
  var app = new Component();
  app._tmpl = document.getElementById('t');
  app._root = document.getElementById('app');
  app._render();
  window.__familyCommand = app;   // handy for debugging in the console
}
if (document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

})();

</script>
